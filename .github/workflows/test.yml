name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run tests
        run: |
          # Discover tests from the repo root (the tests/ directory is not
          # yet on main — it arrives with the queued test PRs). Exit code 5
          # means "no tests were collected" — tolerate it so the pipeline is
          # green while those PRs are still queued, and starts enforcing the
          # moment the first one lands on main.
          set +e
          python -m pytest -v
          rc=$?
          if [ "$rc" -eq 5 ]; then
            echo "No tests collected yet — CI scaffolding is in place and will run tests once they land."
            exit 0
          fi
          exit "$rc"
